    <meta name="description" content="RUGAN — Empowering rural girl-children through education, mentorship, and advocacy." />

    <!-- Open Graph (social sharing) -->
    <meta property="og:title" content="RUGAN | Empowering Rural Girls" />
    <meta property="og:description" content="Empowering rural girl-children through education, mentorship, and advocacy." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rugan.org" />
    <meta property="og:image" content="https://rugan.org/images/og-image.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RUGAN | Empowering Rural Girls" />
    <meta name="twitter:description" content="Empowering rural girl-children through education, mentorship, and advocacy." />
  </head>
